version: '3.9'

services:
  db:
    image: postgres:15
    container_name: microfinance_db
    environment:
      POSTGRES_DB: microfinance_db
      POSTGRES_USER: microfinance_user
      POSTGRES_PASSWORD: microfinance_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: microfinance_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  ai_service:
    build: ./ai_service
    container_name: microfinance_ai
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ai_service:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: microfinance_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    env_file:
      - .env

volumes:
  postgres_data: